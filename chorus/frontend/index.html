<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chorus</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Mulish:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#07080d; --sur:#0c0e16; --s2:#111521; --s3:#161c2d;
  --b1:#1e2640; --b2:#283352;
  --txt:#ccd6f0; --dim:#4a5d82; --dimmer:#2d3d60;
  --accent:#22d3ee; --acch:#67e8f9;
  --green:#4ade80; --red:#f87171; --orange:#fb923c;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--txt);font-family:'Mulish',sans-serif;font-size:14px}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:10px}

/* Keyframes */
@keyframes spin    {to{transform:rotate(360deg)}}
@keyframes card-in {from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes scan    {0%{transform:translateX(-100%)}100%{transform:translateX(250%)}}
@keyframes tpulse  {0%,100%{background:rgba(34,211,238,.03)}50%{background:rgba(34,211,238,.08)}}
@keyframes orb     {0%,100%{opacity:.05;transform:translate(-50%,-50%) scale(1)}50%{opacity:.1;transform:translate(-50%,-50%) scale(1.05)}}
@keyframes fadein  {from{opacity:0}to{opacity:1}}
@keyframes slideup {from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* Markdown renderer */
.md{word-break:break-word}
.md h2{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--txt);margin:12px 0 5px;border-bottom:1px solid var(--b1);padding-bottom:4px}
.md h3{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--txt);margin:10px 0 4px}
.md h4{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--txt);margin:8px 0 3px}
.md strong{font-weight:700;color:var(--txt)}
.md em{font-style:italic}
.md ul,.md ol{padding-left:20px;margin:5px 0}
.md li{margin-bottom:3px;line-height:1.65}
.md pre{background:var(--s3);border:1px solid var(--b1);border-radius:6px;padding:10px 12px;margin:8px 0;overflow-x:auto}
.md pre code{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--txt);background:none;border:none;padding:0}
.md code{font-family:'JetBrains Mono',monospace;background:var(--s3);border:1px solid var(--b1);border-radius:3px;padding:1px 5px;font-size:11px;color:var(--acch)}
.md hr{border:none;border-top:1px solid var(--b1);margin:10px 0}
.md .gap{height:7px}

/* Typing card scanline */
.typing-card{animation:tpulse 2.2s ease-in-out infinite;position:relative}
.typing-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:scan 1.8s ease-in-out infinite}

/* D3 tree */
.tree-node circle{stroke-width:1.5px;cursor:pointer;transition:all .15s}
.tree-node text{font-family:'Mulish',sans-serif;font-size:11px;fill:var(--txt);pointer-events:none}
.tree-link{fill:none;stroke:var(--b1);stroke-width:1.5px}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config={theme:{extend:{
  colors:{bg:'#07080d',sur:'#0c0e16',s2:'#111521',s3:'#161c2d',b1:'#1e2640',b2:'#283352',txt:'#ccd6f0',dim:'#4a5d82',dimmer:'#2d3d60',accent:'#22d3ee',acch:'#67e8f9'},
  fontFamily:{syne:['Syne','sans-serif'],mulish:['Mulish','sans-serif'],mono:['"JetBrains Mono"','monospace']}
}}}
</script>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>

<script type="text/babel">
'use strict';
const {useState,useEffect,useRef,useCallback,useMemo}=React;
const API='';

/* ═══════════════════════════════ MARKDOWN ═══════════════════════════════ */
function applyInline(s){
  return s
    .replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/__(.+?)__/g,'<strong>$1</strong>')
    .replace(/\*([^*\n]+)\*/g,'<em>$1</em>')
    .replace(/_([^_\n]+)_/g,'<em>$1</em>');
}
function mdToHtml(raw){
  if(!raw)return'';
  let s=String(raw)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const blocks=[];
  s=s.replace(/```[\w]*\n?([\s\S]*?)```/g,(_,c)=>{blocks.push(`<pre><code>${c.trim()}</code></pre>`);return`\x00B${blocks.length-1}\x00`;});
  s=s.replace(/`([^`\n]+)`/g,(_,c)=>{blocks.push(`<code>${c}</code>`);return`\x00B${blocks.length-1}\x00`;});
  const lines=s.split('\n'),out=[];
  let inUl=false,inOl=false;
  const closeList=()=>{if(inUl){out.push('</ul>');inUl=false}if(inOl){out.push('</ol>');inOl=false}};
  for(const ln of lines){
    if(/^### /.test(ln)){closeList();out.push(`<h4>${applyInline(ln.slice(4))}</h4>`);continue}
    if(/^## /.test(ln)){closeList();out.push(`<h3>${applyInline(ln.slice(3))}</h3>`);continue}
    if(/^# /.test(ln)){closeList();out.push(`<h2>${applyInline(ln.slice(2))}</h2>`);continue}
    const um=ln.match(/^[-*+] (.*)/);
    if(um){if(!inUl){if(inOl){out.push('</ol>');inOl=false}out.push('<ul>');inUl=true}out.push(`<li>${applyInline(um[1])}</li>`);continue}
    const om=ln.match(/^\d+\. (.*)/);
    if(om){if(!inOl){if(inUl){out.push('</ul>');inUl=false}out.push('<ol>');inOl=true}out.push(`<li>${applyInline(om[1])}</li>`);continue}
    if(/^---+$/.test(ln.trim())){closeList();out.push('<hr>');continue}
    if(!ln.trim()){closeList();out.push('<div class="gap"></div>');continue}
    closeList();out.push(applyInline(ln));
  }
  closeList();
  let r=out.join('\n');
  r=r.replace(/\x00B(\d+)\x00/g,(_,i)=>blocks[+i]);
  r=r.replace(/\n(?!<(?:div|ul|ol|li|h[2-4]|pre|hr))/g,'<br>');
  return r;
}

/* ═══════════════════════════════ HOOKS ═══════════════════════════════ */
function useToast(){
  const [state,setState]=useState({msg:'',show:false});
  const t=useRef(null);
  const show=useCallback((msg)=>{
    if(t.current)clearTimeout(t.current);
    setState({msg,show:true});
    t.current=setTimeout(()=>setState(s=>({...s,show:false})),2400);
  },[]);
  return[state,show];
}

function useChorus(toast){
  const[platforms,setPlatforms]=useState({});
  const[selected,setSelected]=useState(new Set());
  const[progress,setProgress]=useState({});
  const[responses,setResponses]=useState({});
  const[prompt,setPromptState]=useState('');
  const[session,setSessionState]=useState(null);
  const sessionRef=useRef(null);
  const[history,setHistory]=useState([]);
  const[connected,setConnected]=useState(false);
  const[sending,setSending]=useState(false);
  const[secs,setSecs]=useState(0);
  const secsRef=useRef(null);
  const[profiles,setProfiles]=useState({});
  const[selProfiles,setSelProfiles]=useState({});
  const[hasResults,setHasResults]=useState(false);
  const[view,setView]=useState('cards');

  const setSession=useCallback((id)=>{setSessionState(id);sessionRef.current=id;window._currentSessionId=id;},[]);

  // WebSocket
  const wsRef=useRef(null);
  const connectWS=useCallback(()=>{
    try{
      const ws=new WebSocket(`ws://${location.host}/ws`);
      wsRef.current=ws;
      ws.onopen=()=>setConnected(true);
      ws.onclose=()=>{setConnected(false);setTimeout(connectWS,4000)};
      ws.onerror=()=>{};
      ws.onmessage=(e)=>{
        try{
          const msg=JSON.parse(e.data);
          if(msg.type==='platform_update'&&msg.session_id===sessionRef.current){
            setProgress(p=>({...p,[msg.platform]:{status:msg.status,message:msg.message}}));
            if(msg.response&&typeof msg.response==='string'){
              setResponses(r=>({...r,[msg.platform]:msg.response}));setHasResults(true);
            }
          }
          if(msg.type==='session_complete'&&msg.session_id===sessionRef.current){
            setResponses(msg.responses);setSending(false);
            clearInterval(secsRef.current);setHasResults(true);setView('cards');
            loadHistory();toast('All responses collected!');
          }
        }catch(err){}
      };
    }catch(err){}
  },[toast]);

  useEffect(()=>{
    (async()=>{
      try{
        const res=await fetch(`${API}/api/platforms`);
        if(!res.ok)throw new Error();
        const data=await res.json();
        window._platformMeta=data;setPlatforms(data);
        setSelected(new Set(Object.keys(data)));
        await Promise.all(Object.keys(data).map(loadProfilesFor));
      }catch(e){toast('Server not reachable — is Chorus running?');}
      connectWS();loadHistory();
    })();
  },[]);

  async function loadProfilesFor(key){
    try{
      const res=await fetch(`${API}/api/platforms/${key}/profiles`);
      const list=await res.json();const arr=Array.isArray(list)?list:['default'];
      setProfiles(p=>({...p,[key]:arr}));
      setSelProfiles(p=>({...p,[key]:p[key]||arr[0]||'default'}));
    }catch(e){
      setProfiles(p=>({...p,[key]:['default']}));
      setSelProfiles(p=>({...p,[key]:p[key]||'default'}));
    }
  }

  async function loadHistory(){
    try{
      const res=await fetch(`${API}/api/history?limit=20`);if(!res.ok)return;
      const data=await res.json();const seen=new Set();
      setHistory(data.filter(s=>{const k=s.prompt.trim().slice(0,100);if(seen.has(k))return false;seen.add(k);return true;}));
    }catch(e){}
  }

  async function sendQuery(txt){
    if(!txt.trim()){toast('Please enter a prompt');return;}
    if(!selected.size){toast('Select at least one AI');return;}
    setPromptState(txt);setResponses({});setHasResults(false);setSending(true);setView('flow');
    const init={};[...selected].forEach(k=>{init[k]={status:'queued',message:'Queued'}});setProgress(init);
    setSecs(0);clearInterval(secsRef.current);secsRef.current=setInterval(()=>setSecs(s=>s+1),1000);
    try{
      const profs={};[...selected].forEach(k=>{if(selProfiles[k])profs[k]=selProfiles[k]});
      const res=await fetch(`${API}/api/query`,{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({prompt:txt,platforms:[...selected],profiles:profs})});
      const data=await res.json();setSession(data.session_id);
    }catch(e){toast('Failed to start query — is Chorus running?');setSending(false);clearInterval(secsRef.current);}
  }

  async function sendFollowUp(fp){
    if(!fp.trim()){toast('Enter a follow-up question');return;}
    if(!session){toast('No active session');return;}
    const init={};Object.keys(responses).forEach(k=>{init[k]={status:'queued',message:'Queued'}});setProgress(init);setSending(true);
    try{
      const res=await fetch(`${API}/api/sessions/${session}/followup`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:fp})});
      const data=await res.json();setSession(data.session_id);toast('Follow-up sent to all AIs…');
    }catch(e){toast('Follow-up failed: '+e.message);setSending(false);}
  }

  async function retryPlatform(key){
    if(!session)return;
    try{const r=await fetch(`/api/sessions/${session}/retry/${key}`,{method:'POST'});
      if(!r.ok){const d=await r.json().catch(()=>({}));let det=d;
        try{if(typeof d.detail==='string')det=JSON.parse(d.detail)}catch(e){}
        if(det?.code==='max_retries')toast('Max retries reached');}}catch(e){}
  }

  async function deleteHistory(id){
    try{await fetch(`${API}/api/history/${id}`,{method:'DELETE'});setHistory(h=>h.filter(s=>s.id!==id));}
    catch(e){toast('Could not delete');}
  }

  function loadHistoryEntry(entry){
    setPromptState(entry.prompt||'');setResponses(entry.responses||{});
    setSession(entry.id);setHasResults(true);setView('cards');
  }

  function exportSession(){
    if(!session){toast('No session to export');return;}
    const a=document.createElement('a');a.href=`${API}/api/export/${session}`;a.download=`chorus-${session}.md`;a.click();
  }

  async function createProfile(key,name){
    const prof=name.trim().replace(/[^a-zA-Z0-9_-]/g,'_')||'account2';
    try{
      await fetch(`${API}/api/platforms/${key}/profiles/${encodeURIComponent(prof)}`,{method:'POST'});
      toast(`Opening ${platforms[key]?.name} for login…`);await loadProfilesFor(key);
    }catch(e){toast('Failed to create profile');}
  }

  const togglePlatform=useCallback((key)=>{
    setSelected(prev=>{const next=new Set(prev);
      if(next.has(key)){if(next.size<=1)return prev;next.delete(key);}else next.add(key);return next;});
  },[]);
  const selectAll=()=>setSelected(new Set(Object.keys(platforms)));
  const selectNone=()=>{const ks=Object.keys(platforms);if(ks.length>1)setSelected(new Set([ks[0]]));};
  const setSelProfile=(key,val)=>setSelProfiles(p=>({...p,[key]:val}));

  return{platforms,selected,togglePlatform,selectAll,selectNone,
    progress,responses,prompt,session,history,connected,sending,secs,
    profiles,selProfiles,setSelProfile,createProfile,
    hasResults,view,setView,
    sendQuery,sendFollowUp,retryPlatform,deleteHistory,loadHistoryEntry,exportSession};
}

/* ═══════════════════════════════ SMALL ATOMS ═══════════════════════════════ */

function Toast({msg,show}){
  return(
    <div style={{position:'fixed',bottom:20,left:'50%',transform:`translateX(-50%) translateY(${show?0:8}px)`,opacity:show?1:0,transition:'all .2s',pointerEvents:'none',zIndex:300,whiteSpace:'nowrap'}}>
      <div className="bg-s3 border border-b2 rounded-full px-5 py-2 text-xs font-mulish font-semibold text-txt shadow-xl">{msg}</div>
    </div>
  );
}

function Spinner(){
  return<div className="w-4 h-4 rounded-full border-2 border-b2 border-t-accent flex-shrink-0" style={{animation:'spin .7s linear infinite'}}/>;
}

function SectionLabel({children,right}){
  return(
    <div className="flex items-center mb-2.5">
      <span className="font-syne text-[10px] font-bold text-dimmer uppercase tracking-[1.2px]">{children}</span>
      {right&&<div className="ml-auto">{right}</div>}
    </div>
  );
}

/* ═══════════════════════════════ HEADER ═══════════════════════════════ */
function Header({connected,onManage,onToggle,drawerOpen}){
  return(
    <header className="h-14 bg-sur border-b border-b1 flex items-center px-4 gap-3 flex-shrink-0 relative z-20">
      {/* Hamburger */}
      <button className="md:hidden p-1.5 rounded-lg hover:bg-s2 transition-colors" onClick={onToggle} aria-label="Toggle menu">
        <div className="w-5 flex flex-col gap-[5px]">
          {[0,1,2].map(i=>(
            <span key={i} className="block h-0.5 rounded-full transition-all duration-200"
              style={{background:'var(--dim)',
                transform:drawerOpen&&i===0?'rotate(45deg) translate(3.5px,3.5px)':drawerOpen&&i===2?'rotate(-45deg) translate(3.5px,-3.5px)':'none',
                opacity:drawerOpen&&i===1?0:1}}/>
          ))}
        </div>
      </button>

      {/* Logo */}
      <div className="flex items-baseline gap-2.5">
        <span className="font-syne text-[22px] font-extrabold tracking-tighter leading-none"
          style={{background:'linear-gradient(130deg,#22d3ee,#818cf8)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',backgroundClip:'text'}}>
          Chorus
        </span>
        <span className="hidden sm:block text-[11px] text-dimmer font-mulish tracking-wide">multi-AI</span>
      </div>

      <div className="flex-1"/>

      {/* Connection pill */}
      <div className={`text-[11px] font-semibold font-mulish px-3 py-1 rounded-full border tracking-wide transition-colors
        ${connected?'text-green-400 border-green-400/20 bg-green-400/5':'text-red-400 border-red-400/20 bg-red-400/5'}`}>
        ● {connected?'Live':'Offline'}
      </div>

      {/* Manage */}
      <button onClick={onManage}
        className="hidden sm:block text-[12px] font-semibold font-mulish text-dim border border-b1 rounded-lg px-3 py-1.5 hover:border-b2 hover:text-txt transition-all tracking-wide">
        Manage Accounts
      </button>

      {/* Bottom accent */}
      <div className="absolute bottom-0 left-0 right-0 h-px"
        style={{background:'linear-gradient(90deg,transparent,#22d3ee,transparent)',opacity:.18}}/>
    </header>
  );
}

/* ═══════════════════════════════ PLATFORM BUTTON ═══════════════════════════════ */
function PlatformBtn({id,p,selected,onToggle,profs,selProf,onSelProf,onAddProf}){
  const[open,setOpen]=useState(false);
  const[newName,setNewName]=useState('');
  const[showInput,setShowInput]=useState(false);
  const ref=useRef(null);

  useEffect(()=>{
    const h=(e)=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false)};
    document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h);
  },[]);

  return(
    <div ref={ref} className="relative">
      <button onClick={()=>onToggle(id)}
        className={`flex items-center gap-2 w-full px-2.5 py-2 rounded-lg border text-xs font-mulish font-medium transition-all pr-8
          ${selected?'border-b2 bg-s3 text-txt':'border-b1 bg-s2 text-dim hover:border-b2 hover:bg-s3 hover:text-txt'}`}>
        <span className="w-1.5 h-1.5 rounded-full flex-shrink-0" style={{background:p.color}}/>
        <span className="text-[16px] leading-none">{p.icon}</span>
        <span className="flex-1 text-left text-[12px]">{p.name}</span>
        {selected&&<span className="text-accent font-bold text-[10px]">✓</span>}
      </button>
      <button onClick={e=>{e.stopPropagation();setOpen(o=>!o)}}
        className="absolute right-1.5 top-1/2 -translate-y-1/2 text-dimmer hover:text-dim text-[11px] px-1 py-0.5 rounded transition-colors leading-none">⚙</button>

      {open&&(
        <div className="absolute top-full mt-1 right-0 z-50 bg-sur border border-b2 rounded-xl p-2.5 min-w-[175px] shadow-2xl" style={{animation:'slideup .12s ease both'}}>
          <div className="font-syne text-[9px] font-bold text-dimmer uppercase tracking-widest mb-2 px-1">{p.icon} {p.name} accounts</div>
          {(profs||['default']).map(prof=>(
            <label key={prof} className={`flex items-center gap-2 px-2 py-1.5 rounded-lg cursor-pointer text-[12px] transition-colors
              ${prof===selProf?'text-txt bg-s3':'text-dim hover:bg-s2 hover:text-txt'}`}>
              <input type="radio" name={`prof-${id}`} value={prof} checked={prof===selProf}
                onChange={()=>onSelProf(id,prof)} className="accent-accent"/>
              {prof}
            </label>
          ))}
          <button onClick={()=>setShowInput(v=>!v)}
            className="w-full mt-2 py-1.5 bg-s2 border border-dashed border-b2 rounded-lg text-dim text-[11px] font-mulish hover:border-accent hover:text-accent transition-all">
            + Add account
          </button>
          {showInput&&(
            <input autoFocus
              className="w-full mt-1.5 bg-s2 border border-b1 rounded-lg text-txt text-[12px] px-2.5 py-1.5 outline-none focus:border-accent transition-colors font-mulish"
              placeholder="Name (e.g. work)" value={newName} onChange={e=>setNewName(e.target.value)}
              onKeyDown={e=>{if(e.key==='Enter'&&newName.trim()){onAddProf(id,newName);setNewName('');setShowInput(false);setOpen(false)}}}/>
          )}
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════ PROGRESS CARD ═══════════════════════════════ */
function ProgressCard({id,name,icon,status,message,onRetry,onReLogin}){
  const typing=status==='typing',done=status==='done',err=status==='error';
  let errCode=null,errMsg=message;
  if(err&&message){const m=/^\[(\w+)\]\s*(.*)$/.exec(message);if(m){errCode=m[1];errMsg=m[2]}}
  const isAuth=errCode==='auth_expired';

  const accent=typing?'var(--accent)':done?'var(--green)':err?'var(--red)':'var(--b1)';
  return(
    <div className={`relative flex items-center gap-2 px-3 py-2.5 rounded-lg border text-xs overflow-hidden transition-colors
      ${typing?'border-accent/20 typing-card':done?'border-green-400/20 bg-s2':err?'border-red-400/20 bg-s2':'border-b1 bg-s2'}`}>
      <div className="absolute left-0 top-0 bottom-0 w-[3px] rounded-l-lg" style={{background:accent,boxShadow:typing?`0 0 8px ${accent}`:'none'}}/>
      <span className="text-[15px] ml-1">{icon}</span>
      <span className="font-semibold text-txt font-mulish text-[12px]">{name}</span>
      <span className="text-dimmer ml-auto text-[11px] font-mulish truncate max-w-[100px]">{err?errMsg:(message||status)}</span>
      {typing&&<Spinner/>}
      {done&&<span className="text-green-400 text-[13px]">✓</span>}
      {err&&(
        <>
          <span className="text-red-400 text-[13px]">✕</span>
          {isAuth
            ?<button onClick={onReLogin} className="ml-1 px-2 py-0.5 text-[10px] font-semibold border border-red-400 rounded text-red-400 hover:bg-red-400 hover:text-black transition-all">Re-login</button>
            :<button onClick={()=>onRetry(id)} className="ml-1 px-2 py-0.5 text-[10px] font-semibold border border-red-400 rounded text-red-400 hover:bg-red-400 hover:text-black transition-all">Retry</button>
          }
        </>
      )}
    </div>
  );
}

/* ═══════════════════════════════ RESPONSE CARD ═══════════════════════════════ */
function ResponseCard({pkey,resp,pmeta,onCopy,delay=0}){
  const[expanded,setExpanded]=useState(false);
  const[overflow,setOverflow]=useState(false);
  const bodyRef=useRef(null);
  const p=pmeta||{name:pkey,color:'#888',icon:'🤖'};
  const wc=useMemo(()=>resp.trim().split(/\s+/).filter(Boolean).length,[resp]);

  useEffect(()=>{
    const check=()=>{if(bodyRef.current)setOverflow(bodyRef.current.scrollHeight>bodyRef.current.clientHeight+4)};
    requestAnimationFrame(check);
  },[resp]);

  return(
    <div className="flex flex-col bg-sur border border-b1 rounded-xl overflow-hidden hover:border-b2 hover:shadow-[0_8px_32px_rgba(0,0,0,.45)] transition-all duration-200"
      style={{borderTop:`2px solid ${p.color}`,animation:'card-in .3s ease both',animationDelay:`${delay}ms`}}>
      {/* Header */}
      <div className="flex items-center gap-2 px-3.5 py-2.5 bg-s2 border-b border-b1 flex-shrink-0">
        <span className="w-2 h-2 rounded-full flex-shrink-0" style={{background:p.color}}/>
        <span className="text-[16px]">{p.icon}</span>
        <span className="font-syne font-bold text-[13px] text-txt">{p.name}</span>
        <span className="ml-auto text-[10px] text-dimmer font-mono mr-1">{wc}w</span>
        <button onClick={()=>onCopy(resp)}
          className="bg-s3 border border-b1 rounded-md text-dim px-2.5 py-0.5 text-[11px] font-mulish font-semibold hover:text-txt hover:border-b2 transition-all"
          aria-label="Copy response">Copy</button>
      </div>
      {/* Body */}
      <div ref={bodyRef}
        className={`md px-3.5 py-3.5 overflow-y-auto transition-all duration-300 ${expanded?'':'max-h-[280px]'}`}
        style={{fontSize:'12.5px',lineHeight:'1.75',color:'var(--txt)',fontFamily:'Mulish,sans-serif'}}
        dangerouslySetInnerHTML={{__html:DOMPurify.sanitize(mdToHtml(resp))}}/>
      {overflow&&(
        <button onClick={()=>setExpanded(e=>!e)}
          className="w-full py-1.5 border-t border-b1 bg-s2 text-dim text-[11px] font-mulish font-semibold hover:text-txt hover:bg-s3 transition-all text-center flex-shrink-0">
          {expanded?'Show less ↑':'Show more ↓'}
        </button>
      )}
    </div>
  );
}

/* ═══════════════════════════════ RESPONSE MODAL ═══════════════════════════════ */

// ── Flow View ──
function FlowView({prompt,responses,platforms,progress}){
  const containerRef=useRef(null);
  const[dims,setDims]=useState({w:800,h:600});
  const[modal,setModal]=useState(null);

  useEffect(()=>{
    if(!containerRef.current)return;
    const ro=new ResizeObserver(entries=>{
      const{width,height}=entries[0].contentRect;
      setDims({w:Math.max(width,300),h:Math.max(height,300)});
    });
    ro.observe(containerRef.current);
    return()=>ro.disconnect();
  },[]);

  const entries=Object.entries(platforms);
  const{w:W,h:H}=dims;

  // Prompt node
  const pW=Math.min(280,W*.55),pH=54,pX=W/2,pY=40;

  // AI node layout
  const nW=118,nH=66,hGap=12,vGap=60;
  const perRow=Math.min(4,entries.length);
  const rows=[];
  for(let i=0;i<entries.length;i+=perRow)rows.push(entries.slice(i,i+perRow));

  const nodePos={};
  const startY=pY+pH+vGap;
  rows.forEach((row,ri)=>{
    const rowW=row.length*nW+(row.length-1)*hGap;
    const rowX=(W-rowW)/2;
    row.forEach(([key],ci)=>{
      nodePos[key]={x:rowX+ci*(nW+hGap)+nW/2,y:startY+ri*(nH+vGap)+nH/2};
    });
  });

  const edges=entries.map(([key])=>{
    const pos=nodePos[key];
    if(!pos)return null;
    const x1=pX,y1=pY+pH,x2=pos.x,y2=pos.y-nH/2;
    const my=(y1+y2)/2;
    return{key,d:`M ${x1} ${y1} C ${x1} ${my}, ${x2} ${my}, ${x2} ${y2}`};
  }).filter(Boolean);

  return(
    <div ref={containerRef} className="flex-1 overflow-hidden">
      <svg width={W} height={H} style={{display:'block'}}>
        <defs>
          <filter id="glow-f" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="3.5" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="glow-sm" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        {/* Edges */}
        {edges.map(({key,d})=>{
          const p=platforms[key]||{color:'#22d3ee'};
          const st=progress[key]?.status;
          const hasR=typeof responses[key]==='string';
          const active=st==='typing'||st==='queued';
          const pathId=`fp-${key}`;
          return(
            <g key={key}>
              <path id={pathId} d={d} fill="none" stroke={p.color}
                strokeWidth={hasR?2:1.5} strokeOpacity={hasR?.55:.18}/>
              {active&&(
                <circle r="4" fill={p.color} style={{filter:'url(#glow-f)'}}>
                  <animateMotion dur="1.3s" repeatCount="indefinite">
                    <mpath xlinkHref={`#${pathId}`}/>
                  </animateMotion>
                </circle>
              )}
              {hasR&&[0,.5,1].map((off,i)=>(
                <circle key={i} r="2.5" fill={p.color} opacity=".45" style={{filter:'url(#glow-sm)'}}>
                  <animateMotion dur="2.2s" repeatCount="indefinite" begin={`${off*2.2}s`}>
                    <mpath xlinkHref={`#${pathId}`}/>
                  </animateMotion>
                </circle>
              ))}
            </g>
          );
        })}

        {/* Prompt node */}
        <g>
          <rect x={pX-pW/2} y={pY} width={pW} height={pH} rx="10"
            fill="rgba(34,211,238,.06)" stroke="#22d3ee" strokeWidth="1.5"/>
          <text x={pX} y={pY+16} textAnchor="middle"
            fontFamily="Syne,sans-serif" fontSize="9" fontWeight="800" fill="#4a5d82" letterSpacing="1.5">
            PROMPT
          </text>
          <text x={pX} y={pY+36} textAnchor="middle"
            fontFamily="Mulish,sans-serif" fontSize="11.5" fill="#ccd6f0">
            {prompt.length>46?prompt.slice(0,46)+'…':prompt}
          </text>
        </g>

        {/* AI nodes */}
        {entries.map(([key])=>{
          const p=platforms[key]||{name:key,color:'#888',icon:'🤖'};
          const pos=nodePos[key];
          if(!pos)return null;
          const st=progress[key]?.status;
          const hasR=typeof responses[key]==='string';
          const wc=hasR?responses[key].trim().split(/\s+/).filter(Boolean).length:0;
          const active=st==='typing';
          const err=st==='error';
          const queued=st==='queued';
          return(
            <g key={key} onClick={()=>hasR&&setModal({icon:p.icon,name:p.name,color:p.color,full:responses[key]})}
              style={{cursor:hasR?'pointer':'default'}}>
              {(active||hasR)&&(
                <rect x={pos.x-nW/2-5} y={pos.y-nH/2-5} width={nW+10} height={nH+10}
                  rx="15" fill={p.color} opacity=".07"/>
              )}
              <rect x={pos.x-nW/2} y={pos.y-nH/2} width={nW} height={nH} rx="10"
                fill={hasR?p.color+'18':'#0c0e16'}
                stroke={err?'#f87171':hasR?p.color:active?p.color:queued?p.color+'44':'#1e2640'}
                strokeWidth={hasR||active?1.8:1}
                style={active?{filter:`drop-shadow(0 0 6px ${p.color}55)`}:{}}/>
              <text x={pos.x} y={pos.y-11} textAnchor="middle" fontSize="18" dominantBaseline="middle">{p.icon}</text>
              <text x={pos.x} y={pos.y+8} textAnchor="middle"
                fontFamily="Syne,sans-serif" fontSize="11.5" fontWeight="700"
                fill={hasR?p.color:active?p.color:'#ccd6f0'}>{p.name}</text>
              {wc>0&&(
                <text x={pos.x} y={pos.y+23} textAnchor="middle"
                  fontFamily="Mulish,sans-serif" fontSize="9" fill="#4a5d82">{wc} words</text>
              )}
              {active&&(
                <circle cx={pos.x+nW/2-9} cy={pos.y-nH/2+9} r="4" fill={p.color}
                  style={{filter:`drop-shadow(0 0 4px ${p.color})`}}>
                  <animate attributeName="opacity" values="1;.25;1" dur=".9s" repeatCount="indefinite"/>
                </circle>
              )}
              {hasR&&(
                <text x={pos.x+nW/2-9} y={pos.y-nH/2+12} textAnchor="middle"
                  fontFamily="Mulish,sans-serif" fontSize="10" fill={p.color}>✓</text>
              )}
            </g>
          );
        })}
      </svg>
      {modal&&<ResponseModal data={modal} onClose={()=>setModal(null)}/>}
    </div>
  );
}

// ── Diff View ──
function DiffView({responses,platforms}){
  const entries=Object.entries(responses).filter(([,r])=>typeof r==='string');
  if(entries.length<2)return<div className="p-5 text-dim text-[13px] font-mulish">Need at least 2 responses to show differences.</div>;

  function toSents(t){return typeof t!=='string'?[]:(t||'').split(/(?<=[.!?])\s+/).map(s=>s.trim()).filter(s=>s.length>20)}
  function jaccard(a,b){const wa=new Set(a.toLowerCase().split(/\s+/)),wb=new Set(b.toLowerCase().split(/\s+/));return[...wa].filter(w=>wb.has(w)).length/(wa.size+wb.size-[...wa].filter(w=>wb.has(w)).length)}
  function isUniq(s,others){return others.every(o=>toSents(o).every(x=>jaccard(s,x)<.35))}
  const cols=Math.min(entries.length,3);

  return(
    <div className="flex-1 overflow-y-auto p-4">
      <div className="mb-4 text-[12px] text-dim font-mulish">
        <span className="inline-block bg-accent/5 border-l-2 border-accent px-2.5 py-0.5 rounded-[3px] mr-2 text-txt">highlighted</span>
        = unique to this AI
      </div>
      <div className="grid gap-4" style={{gridTemplateColumns:`repeat(${cols},1fr)`}}>
        {entries.map(([k,r])=>{
          const p=platforms[k]||{name:k,color:'#888',icon:'🤖'};
          const sents=toSents(r);
          const others=entries.filter(([x])=>x!==k).map(([,v])=>v);
          return(
            <div key={k}>
              <div className="flex items-center gap-2 font-syne text-[12px] font-bold mb-2.5 pb-2 border-b border-b1 text-txt">
                <span className="w-2 h-2 rounded-full" style={{background:p.color}}/>
                {p.icon} {p.name}
              </div>
              {sents.map((s,i)=>(
                <div key={i} className={`text-[12px] leading-[1.8] px-2 py-0.5 rounded mb-0.5 font-mulish
                  ${isUniq(s,others)?'bg-accent/5 border-l-2 border-accent pl-2.5 text-txt':'text-dim'}`}>{s}</div>
              ))}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── Consensus View ──
function ConsensusView({sessionId,responses,platforms}){
  const[data,setData]=useState(null);
  const[loading,setLoading]=useState(false);
  const[err,setErr]=useState(false);
  const loaded=useRef(null);

  useEffect(()=>{
    if(!sessionId||!Object.keys(responses).length)return;
    if(loaded.current===sessionId)return;
    loaded.current=sessionId;setLoading(true);setErr(false);
    fetch(`${API}/api/sessions/${sessionId}/consensus`)
      .then(r=>r.ok?r.json():Promise.reject())
      .then(d=>{setData(d);setLoading(false)})
      .catch(()=>{setErr(true);setLoading(false)});
  },[sessionId]);

  if(loading)return(
    <div className="flex-1 flex items-center justify-center">
      <div className="text-center"><Spinner/><p className="text-dim text-sm font-mulish mt-3">Analysing responses…</p></div>
    </div>
  );
  if(err)return<div className="p-5"><div className="bg-red-400/5 border border-red-400/20 rounded-xl p-4 text-red-400 text-[13px] font-mulish">Could not load analysis from server.</div></div>;
  if(!data)return<div className="p-5 text-dim text-[13px] font-mulish">No responses to analyse yet.</div>;

  const{agreed_themes=[],unique_points={},platform_scores={},consensus_keywords=[],summary_stats={}}=data;
  const keys=Object.keys(responses);
  const Section=({title,children})=>(
    <div className="mb-5">
      <div className="font-syne text-[10px] font-bold text-dimmer uppercase tracking-[1.2px] mb-3 pb-2 border-b border-b1">{title}</div>
      {children}
    </div>
  );

  return(
    <div className="flex-1 overflow-y-auto p-4">
      {/* Summary pill */}
      <div className="bg-gradient-to-br from-s2 to-s3 border border-b1 rounded-xl p-5 mb-5 text-center">
        <h3 className="font-syne font-extrabold text-[15px] text-txt mb-1.5">🎯 Consensus Report</h3>
        <p className="text-[12px] text-dim font-mulish">{keys.length} AIs · {agreed_themes.length} shared themes · {consensus_keywords.length} keywords</p>
      </div>

      {consensus_keywords.length>0&&(
        <Section title="🔑 Consensus keywords">
          <div className="flex flex-wrap gap-1.5">
            {consensus_keywords.map(kw=>(
              <span key={kw} className="bg-accent/10 text-accent border border-accent/20 px-3 py-0.5 rounded-full text-[12px] font-mulish font-semibold">{kw}</span>
            ))}
          </div>
        </Section>
      )}

      {agreed_themes.length>0&&(
        <Section title={`✅ Agreed themes (${agreed_themes.length})`}>
          {agreed_themes.slice(0,10).map((t,i)=>{
            const pct=Math.round(t.coverage*100);
            return(
              <div key={i} className="bg-sur border border-b1 rounded-lg px-3.5 py-3 mb-2">
                <p className="text-[13px] leading-[1.65] mb-2 text-txt font-mulish">{t.sentence}</p>
                <div className="flex flex-wrap gap-1.5 items-center">
                  {(t.platforms||[]).map(k=>{const pp=platforms[k]||{icon:'🤖',name:k};return(
                    <span key={k} className="text-[10px] px-2 py-0.5 rounded-full border border-b1 bg-s2 text-dim font-mulish">{pp.icon} {pp.name}</span>
                  );})}
                  <span className="ml-auto text-[10px] text-dimmer font-mulish">{pct}% agreement</span>
                </div>
              </div>
            );
          })}
        </Section>
      )}

      {Object.keys(unique_points).length>0&&(
        <Section title="🔭 Unique to each AI">
          {Object.entries(unique_points).map(([plat,sents])=>{
            if(!sents?.length)return null;
            const pp=platforms[plat]||{icon:'🤖',name:plat};
            return(
              <div key={plat} className="mb-3">
                <div className="font-syne text-[12px] font-bold text-txt mb-1.5">{pp.icon} {pp.name}</div>
                {sents.map((s,i)=>(
                  <div key={i} className="bg-sur border border-b1 rounded-lg px-3.5 py-2.5 mb-1.5 text-[13px] leading-[1.65] text-txt font-mulish">{s}</div>
                ))}
              </div>
            );
          })}
        </Section>
      )}

      {Object.keys(platform_scores).length>=2&&(
        <Section title="📊 Platform similarity">
          <div className="flex flex-col gap-2">
            {Object.entries(platform_scores).map(([pa,scores])=>
              Object.entries(scores||{}).map(([pb,score])=>{
                const pct=Math.round(score*100);
                const col=pct>60?'var(--green)':pct>30?'var(--orange)':'var(--dim)';
                const pa_=platforms[pa]||{icon:'🤖',name:pa},pb_=platforms[pb]||{icon:'🤖',name:pb};
                return(
                  <div key={`${pa}-${pb}`} className="flex items-center gap-2.5 text-[12px] font-mulish">
                    <span className="w-[86px] text-txt truncate">{pa_.icon} {pa_.name}</span>
                    <span className="text-dimmer text-[11px]">↔</span>
                    <span className="w-[86px] text-txt truncate">{pb_.icon} {pb_.name}</span>
                    <div className="flex-1 h-[3px] rounded-full bg-s3 overflow-hidden">
                      <div className="h-full rounded-full transition-all duration-500" style={{width:`${pct}%`,background:col}}/>
                    </div>
                    <span className="w-9 text-right font-semibold font-mono text-[11px]" style={{color:col}}>{pct}%</span>
                  </div>
                );
              })
            )}
          </div>
        </Section>
      )}

      {Object.keys(summary_stats).length>0&&(
        <Section title="📈 Response stats">
          <div className="grid gap-2" style={{gridTemplateColumns:'repeat(auto-fill,minmax(140px,1fr))'}}>
            {Object.entries(summary_stats).map(([plat,st])=>{
              const pp=platforms[plat]||{icon:'🤖',name:plat};
              return(
                <div key={plat} className="bg-s2 border border-b1 rounded-lg p-3">
                  <div className="font-syne text-[12px] font-bold text-txt mb-1.5">{pp.icon} {pp.name}</div>
                  <div className="text-[11px] text-dim font-mulish">{st.words} words</div>
                  <div className="text-[11px] text-dim font-mulish">{st.sentences} sentences</div>
                </div>
              );
            })}
          </div>
        </Section>
      )}
    </div>
  );
}

          <textarea value={txt} onChange={e=>setTxt(e.target.value)}
            onKeyDown={e=>{if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();sendQuery(txt)}}}
            placeholder={"Ask something thoughtful…\n\nCtrl+Enter to send"}
            className="w-full bg-s2 border border-b1 rounded-xl text-txt font-mulish text-[13px] px-3.5 py-3 outline-none resize-y min-h-[105px] leading-[1.65] placeholder:text-dimmer font-light transition-all"
            style={{transition:'border-color .15s, box-shadow .15s'}}
            onFocus={e=>{e.target.style.borderColor='var(--accent)';e.target.style.boxShadow='0 0 0 3px rgba(34,211,238,.06)'}}
            onBlur={e=>{e.target.style.borderColor='var(--b1)';e.target.style.boxShadow='none'}}/>
        </div>

        {/* Platform grid */}
        <div className="px-4 pb-4">
          <SectionLabel right={
            <div className="flex gap-3">
              <button onClick={selectAll}  className="text-dim text-[10px] font-mulish font-semibold hover:text-txt transition-colors">All</button>
              <button onClick={selectNone} className="text-dim text-[10px] font-mulish font-semibold hover:text-txt transition-colors">None</button>
            </div>
          }>Send to</SectionLabel>
          <div className="grid grid-cols-1 gap-1.5">
            {Object.entries(platforms).map(([k,p])=>(
              <PlatformBtn key={k} id={k} p={p} selected={selected.has(k)} onToggle={togglePlatform}
                profs={profiles[k]} selProf={selProfiles[k]}
                onSelProf={(k,v)=>{setSelProfile(k,v);toast(`${platforms[k]?.name}: profile "${v}"`)}}
                onAddProf={createProfile}/>
            ))}
          </div>
        </div>

        {/* Send button */}
        <div className="px-4 pb-5">
          <button onClick={()=>sendQuery(txt)} disabled={sending}
            className="w-full py-2.5 rounded-xl font-syne text-[13px] font-bold text-black tracking-wide transition-all relative overflow-hidden group disabled:opacity-50 disabled:cursor-not-allowed"
            style={{background:sending?'var(--s3)':'linear-gradient(135deg,#22d3ee,#818cf8)',color:sending?'var(--dim)':'#000'}}>
            <span className="relative z-10 flex items-center justify-center gap-2">
              {sending&&<Spinner/>}
              {sending?`Querying… ${secs}s`:'⚡ Send to All AIs'}
            </span>
            {!sending&&<span className="absolute inset-0 opacity-0 group-hover:opacity-100 transition-opacity bg-white/10"/>}
          </button>
        </div>

        {/* Progress */}
        {hasProgress&&(
          <div className="px-4 pb-4 border-t border-b1 pt-4">
            <div className="flex items-center justify-between mb-2.5">
              <span className="font-syne text-[10px] font-bold text-dimmer uppercase tracking-[1.2px]">Progress</span>
              <span className="font-mono text-[11px] text-accent">{done}/{total}</span>
            </div>
            {/* Progress bar */}
            <div className="h-[3px] rounded-full bg-s3 mb-3 overflow-hidden">
              <div className="h-full rounded-full transition-all duration-500"
                style={{width:`${pct}%`,background:'linear-gradient(90deg,#22d3ee,#818cf8)'}}/>
            </div>
            <div className="flex flex-col gap-1">
              {Object.entries(progress).map(([k,{status,message}])=>{
                const p=platforms[k]||{name:k,icon:'🤖',color:'#888'};
                return<ProgressCard key={k} id={k} name={p.name} icon={p.icon} status={status} message={message}
                  onRetry={chorus.retryPlatform}
                  onReLogin={()=>{window.ob_startPlatform?.(k);window.openOnboarding?.()}}/>;
              })}
            </div>
          </div>
        )}

        {/* History */}
        <div className="px-4 pb-6 border-t border-b1 pt-4">
          <SectionLabel>Recent</SectionLabel>
          {history.length===0
            ?<div className="text-[12px] text-dimmer font-mulish">No history yet</div>
            :history.map(s=>(
              <div key={s.id}
                className="flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg bg-s2 border border-transparent text-[11px] text-dim mb-1 hover:bg-s3 hover:text-txt hover:border-b1 transition-all group"
                title={s.prompt}>
                <span className="flex-1 truncate cursor-pointer" onClick={()=>loadHistoryEntry(s)}>
                  {s.prompt.slice(0,52)}{s.prompt.length>52?'…':''}
                </span>
                <button onClick={()=>deleteHistory(s.id)}
                  className="text-dimmer hover:text-red-400 text-[11px] px-1 flex-shrink-0 opacity-0 group-hover:opacity-100 transition-all" aria-label="Remove from history">✕</button>
              </div>
            ))
          }
        </div>
      </aside>
    </>
  );
}

/* ═══════════════════════════════ RIGHT PANEL ═══════════════════════════════ */
function RightPanel({chorus,toast}){
  const{responses,hasResults,view,setView,session,platforms,prompt,progress,sending,exportSession,sendFollowUp}=chorus;
  const[fu,setFu]=useState('');
  const VIEWS=[
    {id:'flow',icon:'◈',label:'Flow'},
    {id:'cards',icon:'▦',label:'Cards'},
    {id:'consensus',icon:'◎',label:'Consensus'},
    {id:'diff',icon:'◑',label:'Diff'},
  ];

  return(
    <main className="flex-1 flex flex-col overflow-hidden bg-bg min-w-0">
      {/* Follow-up bar */}
      {hasResults&&(
        <div className="flex flex-wrap sm:flex-nowrap items-center gap-2.5 px-4 py-2.5 bg-sur border-b border-b1 flex-shrink-0">
          <span className="font-syne text-[10px] font-bold text-dimmer uppercase tracking-[1.2px] whitespace-nowrap hidden sm:block">Follow up</span>
          <input value={fu} onChange={e=>setFu(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter'&&fu.trim()){sendFollowUp(fu);setFu('')}}}
            placeholder="Ask a follow-up to all AIs…"
            className="flex-1 min-w-0 bg-s2 border border-b1 rounded-lg text-txt font-mulish text-[13px] px-3 py-1.5 outline-none placeholder:text-dimmer transition-all"
            onFocus={e=>{e.target.style.borderColor='var(--accent)';e.target.style.boxShadow='0 0 0 3px rgba(34,211,238,.06)'}}
            onBlur={e=>{e.target.style.borderColor='var(--b1)';e.target.style.boxShadow='none'}}/>
          <button onClick={()=>{if(fu.trim()){sendFollowUp(fu);setFu('')}}}
            className="bg-accent text-black font-syne text-[12px] font-bold px-4 py-1.5 rounded-lg whitespace-nowrap hover:bg-acch transition-all tracking-wide flex-shrink-0">
            Send
          </button>
        </div>
      )}

      {/* View tabs */}
      {hasResults&&(
        <div className="flex items-center gap-0.5 px-3 py-2 bg-sur border-b border-b1 flex-shrink-0 overflow-x-auto">
          {VIEWS.map(v=>(
            <button key={v.id} onClick={()=>setView(v.id)}
              className={`px-3 py-1.5 rounded-lg font-syne text-[11px] font-bold tracking-wide uppercase transition-all whitespace-nowrap
                ${view===v.id?'bg-accent/10 text-accent':'text-dim hover:text-txt hover:bg-s2'}`}>
              {v.icon} {v.label}
            </button>
          ))}
          <div className="flex-1"/>
          <button onClick={exportSession}
            className="px-3 py-1.5 rounded-lg border border-b1 text-dim font-mulish text-[11px] font-semibold hover:border-b2 hover:text-txt transition-all whitespace-nowrap">
            ↓ Export
          </button>
        </div>
      )}

      {/* View content */}
      {view!=='flow'&&!hasResults&&<Welcome/>}
      {view==='flow'&&(hasResults||Object.keys(progress).length>0)&&<FlowView prompt={prompt} responses={responses} platforms={platforms} progress={progress}/>}
      {view==='flow'&&!hasResults&&Object.keys(progress).length===0&&<Welcome/>}
      {hasResults&&view==='cards'    &&<CardsView     responses={responses} platforms={platforms} toast={toast}/>}
      {hasResults&&view==='consensus'&&<ConsensusView sessionId={session} responses={responses} platforms={platforms}/>}
      {hasResults&&view==='diff'     &&<DiffView      responses={responses} platforms={platforms}/>}
    </main>
  );
}

/* ═══════════════════════════════ ONBOARDING MODAL ═══════════════════════════════ */
function OnboardingModal({open,onClose,platforms}){
  const[screen,setScreen]=useState('s1');
  const[state,setState]=useState({});
  const[curPlat,setCurPlat]=useState(null);
  const[auth,setAuth]=useState('idle');
  const pollRef=useRef(null),toRef=useRef(null);
  const meta=window._platformMeta||{};

  const stop=useCallback(()=>{if(pollRef.current)clearInterval(pollRef.current);if(toRef.current)clearTimeout(toRef.current)},[]);
  const loadState=useCallback(async()=>{const r=await fetch('/api/onboarding/state').catch(()=>null);return r?.ok?r.json():{}},[]);

  useEffect(()=>{
    if(!open){stop();return}
    loadState().then(s=>{setState(s);const any=Object.values(s).some(v=>v.status==='completed');setScreen(any?'s2':'s1')}).catch(()=>{});
  },[open]);

  useEffect(()=>{window.ob_startPlatform=(k)=>{setCurPlat(k);setAuth('idle');setScreen('s3')};},[]);

  const showChecklist=async()=>{stop();const s=await loadState();setState(s);setScreen('s2')};
  const showCompletion=async()=>{stop();const s=await loadState();setState(s);setScreen('s4')};
  const finish=async()=>{await fetch('/api/onboarding/complete',{method:'POST'}).catch(()=>{});onClose()};

  const openBrowser=async()=>{
    if(!curPlat)return;setAuth('waiting');
    await fetch(`/api/onboarding/${curPlat}/open`,{method:'POST'}).catch(()=>{});
    pollRef.current=setInterval(async()=>{try{const r=await fetch(`/api/onboarding/${curPlat}/status`);const d=await r.json();if(d.authenticated){stop();setAuth('success')}}catch(e){}},2000);
    toRef.current=setTimeout(()=>{stop();setAuth('timeout')},600000);
  };
  const skip=async()=>{await fetch(`/api/onboarding/${curPlat}/skip`,{method:'POST'}).catch(()=>{});showChecklist()};

  if(!open)return null;
  const Btn=({children,onClick,disabled,secondary})=>(
    <button onClick={onClick} disabled={disabled}
      className={`px-5 py-2.5 rounded-xl font-syne text-[13px] font-bold tracking-wide transition-all
        ${secondary
          ?'bg-transparent border border-b1 text-dim hover:border-b2 hover:text-txt'
          :'text-black disabled:opacity-40 disabled:cursor-not-allowed'}`}
      style={!secondary?{background:disabled?'var(--s3)':'linear-gradient(135deg,#22d3ee,#818cf8)',color:disabled?'var(--dim)':'#000'}:{}}>
      {children}
    </button>
  );

  return(
    <div className="fixed inset-0 bg-black/75 backdrop-blur-md z-[950] flex items-center justify-center p-4"
      onClick={e=>{if(e.target===e.currentTarget)onClose()}} style={{animation:'fadein .15s ease'}}>
      <div className="bg-sur border border-b2 rounded-2xl px-7 py-7 w-[520px] max-w-full max-h-[88vh] overflow-y-auto shadow-[0_28px_80px_rgba(0,0,0,.7)]">

        {screen==='s1'&&(
          <div style={{animation:'slideup .2s ease'}}>
            <h2 className="font-syne font-extrabold text-[1.1rem] text-txt mb-3">Welcome to Chorus</h2>
            <p className="text-dim leading-[1.65] mb-6 text-[.88rem] font-mulish">
              Chorus opens a real browser for each AI platform so you can log in once. Your sessions are saved locally in{' '}
              <code className="bg-s2 px-1.5 py-0.5 rounded text-[.85em] font-mono text-acch">~/.chorus/profiles/</code>.
              You can skip any platform and connect it later.
            </p>
            <Btn onClick={showChecklist}>Get Started →</Btn>
          </div>
        )}

        {screen==='s2'&&(
          <div style={{animation:'slideup .2s ease'}}>
            <h2 className="font-syne font-extrabold text-[1rem] text-txt mb-4">Connect Your AI Platforms</h2>
            <div className="grid grid-cols-2 gap-2 mb-6">
              {Object.entries(meta).map(([k,p])=>{
                const s=state[k]?.status;
                return(
                  <div key={k} className="bg-s2 border border-b1 rounded-xl p-3 flex flex-col gap-2.5 hover:border-b2 transition-colors">
                    <div className="flex items-center gap-2">
                      <span className="text-lg">{p.icon}</span>
                      <span className="font-syne font-bold text-[13px] text-txt">{p.name}</span>
                      {s==='completed'&&<span className="ml-auto text-green-400 text-sm">✓</span>}
                      {s==='skipped'&&<span className="ml-auto text-dimmer text-[11px]">Skipped</span>}
                    </div>
                    {s!=='completed'&&(
                      <button onClick={()=>{setCurPlat(k);setAuth('idle');setScreen('s3')}}
                        className="w-full py-1.5 text-[11px] font-semibold font-mulish border border-b1 rounded-lg text-dim hover:border-b2 hover:text-txt transition-all">
                        {s==='skipped'?'Connect':'Log in'}
                      </button>
                    )}
                  </div>
                );
              })}
            </div>
            <div className="flex justify-end gap-2.5">
              <Btn secondary onClick={onClose}>Close</Btn>
              <Btn onClick={showCompletion} disabled={!Object.values(state).some(v=>v.status==='completed')}>Done →</Btn>
            </div>
          </div>
        )}

        {screen==='s3'&&(
          <div style={{animation:'slideup .2s ease'}}>
            <button className="text-dim text-[.85rem] font-mulish mb-4 hover:text-txt transition-colors block" onClick={showChecklist}>← Back</button>
            <h2 className="font-syne font-extrabold text-[1rem] text-txt mb-2">{meta[curPlat]?.icon} {meta[curPlat]?.name}</h2>
            <p className="text-dim text-[.85rem] mb-5 leading-[1.65] font-mulish">
              Click <strong className="text-txt">Open Browser</strong>. A Chromium window will open to the login page. Log in, and Chorus will detect your session automatically.
            </p>
            <div className="flex items-center gap-3 mb-5">
              <Btn onClick={openBrowser} disabled={auth==='waiting'}>
                {auth==='waiting'?'⏳ Waiting…':'Open Browser'}
              </Btn>
              {auth==='waiting'&&<span className="text-[.82rem] text-dim font-mulish flex items-center gap-1.5"><Spinner/> Detecting login…</span>}
              {auth==='success'&&<span className="text-green-400 text-[.85rem] font-mulish font-semibold">✓ Logged in!</span>}
              {auth==='timeout'&&<span className="text-red-400 text-[.82rem] font-mulish">Timed out. Try again or skip.</span>}
            </div>
            <div className="flex justify-end gap-2.5">
              <Btn secondary onClick={skip}>Skip</Btn>
              <Btn onClick={showChecklist} disabled={auth!=='success'}>Continue →</Btn>
            </div>
          </div>
        )}

        {screen==='s4'&&(
          <div style={{animation:'slideup .2s ease'}}>
            <h2 className="font-syne font-extrabold text-[1rem] text-txt mb-4">You're all set!</h2>
            <div className="mb-5 border border-b1 rounded-xl overflow-hidden">
              {Object.entries(state).map(([k,info])=>{
                const p=meta[k]||{};const s=info.status;
                return(
                  <div key={k} className="flex items-center gap-2.5 px-4 py-3 border-b border-b1 last:border-0 text-[.87rem] font-mulish">
                    <span className="text-lg">{p.icon||''}</span>
                    <span className="flex-1 text-txt font-semibold">{p.name||k}</span>
                    <span className={`text-[.8rem] font-semibold ${s==='completed'?'text-green-400':'text-dimmer'}`}>
                      {s==='completed'?'✓ Logged in':s==='skipped'?'Skipped':'Pending'}
                    </span>
                  </div>
                );
              })}
            </div>
            <p className="text-[.82rem] text-dim mb-5 font-mulish">You can connect skipped platforms anytime via Manage Accounts.</p>
            <Btn onClick={finish}>Start Using Chorus →</Btn>
          </div>
        )}
      </div>
    </div>
  );
}

/* ═══════════════════════════════ EXPLAINER OVERLAY ═══════════════════════════════ */
function ExplainerOverlay(){
  const[vis,setVis]=useState(false);
  const tRef=useRef(null);
  const dismiss=useCallback(()=>{
    setVis(false);localStorage.setItem('chorus_seen','1');
    if(tRef.current)clearTimeout(tRef.current);
  },[]);

  useEffect(()=>{
    if(localStorage.getItem('chorus_seen'))return;
    fetch('/api/onboarding/state').then(r=>r.ok?r.json():null).then(s=>{
      if(!s||!Object.values(s).some(v=>v.status==='completed'))return;
      setVis(true);
      tRef.current=setTimeout(dismiss,3400);
      document.addEventListener('keydown',dismiss,{once:true});
      document.addEventListener('click',dismiss,{once:true});
    }).catch(()=>{});
    return()=>{if(tRef.current)clearTimeout(tRef.current)};
  },[dismiss]);

  if(!vis)return null;
  return(
    <div className="fixed inset-0 z-[9999] flex flex-col items-center justify-center gap-4 bg-bg/97 pointer-events-auto"
      style={{animation:'fadein .3s ease'}}>
      <div className="font-syne text-[36px] sm:text-[48px] font-extrabold text-center leading-tight tracking-tight max-w-[600px] px-6"
        style={{background:'linear-gradient(130deg,#22d3ee,#818cf8)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',backgroundClip:'text'}}>
        Ask all AI models at once.<br/>See where they agree.
      </div>
      <div className="font-mulish text-[15px] text-dim text-center">10 AIs. One prompt. Zero API keys.</div>
    </div>
  );
}

/* ═══════════════════════════════ APP ═══════════════════════════════ */
function App(){
  const[toastState,toast]=useToast();
  const chorus=useChorus(toast);
  const[drawerOpen,setDrawerOpen]=useState(false);
  const[onboardOpen,setOnboardOpen]=useState(false);

  // Close drawer on resize to md+
  useEffect(()=>{
    window.openOnboarding=()=>setOnboardOpen(true);
    const h=()=>{if(window.innerWidth>=768)setDrawerOpen(false)};
    window.addEventListener('resize',h);return()=>window.removeEventListener('resize',h);
  },[]);

  // On md+ the left panel should be visible via position override
  useEffect(()=>{
    const panel=document.querySelector('[data-panel="left"]');
    if(!panel)return;
    const apply=()=>{
      if(window.innerWidth>=768){
        panel.style.position='relative';panel.style.top='';panel.style.bottom='';
        panel.style.left='';panel.style.transform='none';panel.style.zIndex='auto';
      } else {
        panel.style.position='fixed';panel.style.top='56px';panel.style.bottom='0';
        panel.style.left='0';panel.style.zIndex='40';
        panel.style.transform=drawerOpen?'translateX(0)':'translateX(-100%)';
      }
    };
    apply();window.addEventListener('resize',apply);return()=>window.removeEventListener('resize',apply);
  },[drawerOpen]);

  return(
    <div className="flex flex-col h-full bg-bg text-txt" style={{fontFamily:'Mulish,sans-serif'}}>
      <Header connected={chorus.connected} onManage={()=>setOnboardOpen(true)}
        onToggle={()=>setDrawerOpen(o=>!o)} drawerOpen={drawerOpen}/>

      <div className="flex flex-1 overflow-hidden relative">
        <LeftPanel mobileOpen={drawerOpen} onClose={()=>setDrawerOpen(false)} chorus={chorus} toast={toast}/>
        <RightPanel chorus={chorus} toast={toast}/>
      </div>

      <OnboardingModal open={onboardOpen} onClose={()=>setOnboardOpen(false)} platforms={chorus.platforms}/>
      <ExplainerOverlay/>
      <Toast msg={toastState.msg} show={toastState.show}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
